[alembic]
script_location = migrations

# Prepend backend/ to sys.path so 'from app...' imports work in env.py
prepend_sys_path = .

# Migration filename format: YYYYMMDD_HHMM_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
truncate_slug_length = 40
version_path_separator = os

# sqlalchemy.url is overridden in migrations/env.py from app.core.config.settings.
# This value is a fallback for tooling that reads alembic.ini directly.
sqlalchemy.url = postgresql://applytrack:changeme@localhost:5432/applytrack

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
