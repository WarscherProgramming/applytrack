server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: serve index.html for every path that is not a real file.
    # Without this, a hard refresh on /applications/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend container.
    # "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Baseline security headers
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
