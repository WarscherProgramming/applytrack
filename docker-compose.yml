services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # pg_isready uses ${VAR} compose interpolation — resolved from .env at
      # parse time, before the container starts.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    # Persist uploaded resumes/cover letters across container restarts. Matches
    # STORAGE_LOCAL_PATH ("storage", relative to the /app workdir). Swapping to
    # cloud storage later makes this volume unnecessary (see app.shared.storage).
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
